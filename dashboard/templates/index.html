
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom Cheat Detection Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .video-container {
            position: relative;
            width: 100%;
            max-height: 70vh;
            overflow: hidden;
            background-color: #000;
            border-radius: 10px;
        }
        .video-feed {
            width: 100%;
            height: auto;
        }
        .alert-panel {
            max-height: 300px;
            overflow-y: auto;
        }
        .alert-item {
            border-left: 4px solid;
            margin-bottom: 10px;
        }
        .alert-item.sideways_looking {
            border-left-color: #ffc107;
        }
        .alert-item.phone_detected {
            border-left-color: #dc3545;
        }
        .alert-item.suspicious_movement {
            border-left-color: #0dcaf0;
        }
    </style>
</head>
<body>
    <div class="container-fluid py-4">
        <h1 class="mb-4">Classroom Cheat Detection Dashboard</h1>
        
        <div class="row">
            <!-- Video Feed -->
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title mb-0">Live Feed</h5>
                    </div>
                    <div class="card-body p-0">
                        <div class="video-container">
                            <img src="{{ url_for('video_feed') }}" class="video-feed">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Alerts Panel -->
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title mb-0">Live Alerts</h5>
                    </div>
                    <div class="card-body alert-panel" id="alertPanel">
                        <!-- Alerts will be inserted here -->
                    </div>
                </div>

                <div class="card mt-4">
                    <div class="card-header">
                        <h5 class="card-title mb-0">Alert History</h5>
                    </div>
                    <div class="card-body alert-panel" id="alertHistory">
                        <!-- Alert history will be inserted here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function updateAlerts() {
            fetch('/alerts')
                .then(response => response.json())
                .then(alerts => {
                    const alertPanel = document.getElementById('alertPanel');
                    alerts.forEach(alert => {
                        const alertDiv = document.createElement('div');
                        alertDiv.className = `alert-item p-3 ${alert.type}`;
                        alertDiv.innerHTML = `
                            <div class="d-flex justify-content-between">
                                <strong>${alert.type.replace('_', ' ').toUpperCase()}</strong>
                                <small class="text-muted">${alert.timestamp}</small>
                            </div>
                            <div>${alert.message}</div>
                        `;
                        alertPanel.insertBefore(alertDiv, alertPanel.firstChild);
                    });
                });
        }

        function updateAlertHistory() {
            fetch('/alert_history')
                .then(response => response.json())
                .then(alerts => {
                    const historyPanel = document.getElementById('alertHistory');
                    historyPanel.innerHTML = '';
                    alerts.forEach(alert => {
                        const alertDiv = document.createElement('div');
                        alertDiv.className = `alert-item p-3 ${alert.type}`;
                        alertDiv.innerHTML = `
                            <div class="d-flex justify-content-between">
                                <strong>${alert.type.replace('_', ' ').toUpperCase()}</strong>
                                <small class="text-muted">${alert.timestamp}</small>
                            </div>
                            <div>
                                ${Object.entries(alert.details)
                                    .filter(([key]) => key !== 'snapshot')
                                    .map(([key, value]) => `<div><small>${key}: ${value}</small></div>`)
                                    .join('')}
                            </div>
                        `;
                        historyPanel.appendChild(alertDiv);
                    });
                });
        }

        // Update alerts every second
        setInterval(updateAlerts, 1000);
        // Update alert history every 5 seconds
        setInterval(updateAlertHistory, 5000);
        // Initial updates
        updateAlerts();
        updateAlertHistory();
    </script>
</body>
</html>
